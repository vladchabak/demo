services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: localpro_postgres
    environment:
      POSTGRES_DB: localpro_dev
      POSTGRES_USER: localpro
      POSTGRES_PASSWORD: localpro
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U localpro -d localpro_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
