spring:
  datasource:
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    username: ${PGUSER}
    password: ${PGPASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 3
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    url: jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
    user: ${PGUSER}
    password: ${PGPASSWORD}
    baseline-on-migrate: true
    baseline-version: 0

logging:
  level:
    com.localpro: INFO
    org.springframework.security: WARN