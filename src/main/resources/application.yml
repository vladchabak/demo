spring:
  application:
    name: localpro-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/localpro_dev}
    username: ${DB_USER:localpro}
    password: ${DB_PASS:localpro}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5
      data-source-properties:
        ssl: true
        sslmode: require
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: simple

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.localpro: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
